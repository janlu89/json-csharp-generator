<div class="app-shell">
  <app-header />
  <app-direction-toggle
    [externalDirection]="direction()"
    (directionChange)="onDirectionChange($event)" />
  <app-url-fetch
    [direction]="direction()"
    (jsonFetched)="onJsonFetched($event)" />
  <app-split-pane
    class="split-pane-container"
    [direction]="direction()"
    (directionChange)="onDirectionChange($event)" />
</div>
